name: Daily Automated Reminders

on:
  push:
    branches:
      - main
  schedule:
    # Runs at the top of every hour to catch EXACT 24-hour boundaries
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          npm install firebase axios

      - name: Run Automation Script
        run: node scripts/automation_trigger.js
