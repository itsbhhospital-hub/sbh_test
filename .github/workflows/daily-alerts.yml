name: Daily Application Reminders

on:
  schedule:
    # Runs at 02:00 UTC every day, which is 07:30 AM IST
    - cron: '0 2 * * *'
  # Allow manual trigger from the GitHub Actions tab for testing
  workflow_dispatch:

jobs:
  run-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use LTS version

      - name: Install dependencies
        run: npm ci || npm install # Install firebase-admin and other deps

      - name: Execute Reminders Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/github_reminders.js
